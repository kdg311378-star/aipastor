{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - AI 목사님</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #4A90E2; --text-color-light: #f0f0f0; }
        body {
            margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; height: 100vh; display: flex;
            /* ★ 배경 이미지 변경 완료 (십자가와 일몰) */
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), 
                        url("{% static 'images/image_1.jpg' %}");
            background-size: cover; background-position: center;
        }

        /* [왼쪽] 문구 영역 (배경 없이 텍스트만) */
        .intro-section {
            flex: 1.2; display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; padding: 40px;
        }
        
        /* ★ 애니메이션 정의 (투명 -> 불투명 + 위로 살짝 이동) */
        @keyframes fadeInText {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .bible-verse {
            font-family: 'Nanum Myeongjo', serif; font-size: 32px; font-weight: 700; line-height: 1.6; margin-bottom: 20px; text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            animation: fadeInText 1.5s ease-out forwards; /* 애니메이션 적용 */
        }
        .verse-ref {
            font-size: 16px; opacity: 0;
            animation: fadeInText 1.5s ease-out 0.5s forwards; /* 약간 늦게 시작 */
        }

        /* [오른쪽] 폼 영역 컨테이너 */
        .login-section { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; }
        
        /* ★ 핵심: 반투명 검은색 박스 */
        .login-container {
            width: 90%; max-width: 360px; /* 기존보다 약간 작게 */
            background-color: rgba(0, 0, 0, 0.5); /* 검은색 배경, 불투명도 50% */
            padding: 40px;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            color: var(--text-color-light); /* 밝은 텍스트 */
            backdrop-filter: blur(5px); /* (선택) 배경 흐림 효과 */
        }
        
        .login-title { font-size: 28px; font-weight: 700; color: white; margin-bottom: 10px; }
        .login-subtitle { color: #ccc; margin-bottom: 40px; font-size: 15px; }

        /* 입력창 스타일 (어두운 배경에 맞춤) */
        .input-group { margin-bottom: 20px; }
        .input-group input { 
            width: 100%; padding: 14px; border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 8px; 
            font-size: 15px; box-sizing: border-box; 
            background-color: rgba(255, 255, 255, 0.1); /* 반투명 흰색 배경 */
            color: white; transition: 0.2s; 
        }
        .input-group input::placeholder { color: rgba(255, 255, 255, 0.6); }
        .input-group input:focus { border-color: var(--primary-color); background-color: rgba(255, 255, 255, 0.2); outline: none; }

        .login-btn { 
            width: 100%; padding: 16px; background-color: var(--primary-color); color: white; 
            border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; 
            transition: 0.2s; margin-top: 10px; 
        }
        .login-btn:hover { background-color: #357abd; transform: translateY(-2px); }

        .signup-link { margin-top: 30px; text-align: center; font-size: 14px; color: #ccc; }
        .signup-link a { color: #8Ec5FC; text-decoration: none; font-weight: bold; margin-left: 5px; } /* 링크 밝게 */
        .signup-link a:hover { color: white; }

        .error-msg { 
            background-color: rgba(231, 76, 60, 0.2); color: #ff8a80; padding: 12px; border-radius: 8px; 
            font-size: 13px; margin-bottom: 25px; text-align: center; border: 1px solid rgba(231, 76, 60, 0.5); 
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .intro-section { flex: 0.4; padding: 20px; }
            .bible-verse { font-size: 22px; }
            .login-section { flex: 1; padding: 20px; }
            .login-container { width: 100%; padding: 30px; }
        }
    </style>
</head>
<body>
    <div class="intro-section">
        <div class="bible-verse">
            "여호와는<br>
            나의 목자시니"
        </div>
        <div class="verse-ref">시편 23:1</div>
    </div>

    <div class="login-section">
        <div class="login-container">
            <div class="login-title">로그인</div>
            <div class="login-subtitle">오늘도 주님 안에서 평안하세요 🙏</div>

            {% if form.errors %}
                <div class="error-msg">아이디 또는 비밀번호를 확인해주세요.</div>
            {% endif %}

            <form method="post" autocomplete="off">
                {% csrf_token %}
                <div class="input-group">
                    <input type="text" name="username" placeholder="아이디" required autocomplete="off">
                </div>
                <div class="input-group">
                    <input type="password" name="password" placeholder="비밀번호" required autocomplete="off">
                </div>
                <button type="submit" class="login-btn">로그인</button>
            </form>

            <div class="signup-link">
                계정이 없으신가요? <a href="{% url 'signup' %}">회원가입 하기</a>
            </div>
        </div>
    </div>
</body>
</html>
