<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI Pastor - 스마트 상담 채팅</title>
    <style>
        /* 제미나이 스타일 다크 테마 */
        :root {
            --bg-main: #131314;
            --bg-sidebar: #1e1f20;
            --text-main: #e3e3e3;
            --text-muted: #c4c7c5;
            --accent: #8ab4f8;
            --bubble-user: #2b2c2f;
            --bubble-ai: #131314;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* 좌측 사이드바 전체 컨테이너 */
        .sidebar { width: 280px; background-color: var(--bg-sidebar); display: flex; flex-direction: column; border-right: 1px solid #333; }
        
        /* 상단 고정 영역 (타이틀 및 필수 메뉴) */
        .sidebar-top { padding: 20px 20px 10px 20px; }
        .sidebar-header { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; color: var(--text-main); }
        
        /* 공통 버튼 스타일 (위아래 짤림 완벽 방지) */
        .btn-common { 
            display: block; width: 100%; background: none; border: none; 
            text-align: left; padding: 14px 15px; /* 패딩 넉넉히 확보 */
            font-size: 0.95rem; border-radius: 8px; cursor: pointer; 
            transition: all 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            line-height: 1.5; /* ★ 위아래 텍스트 짤림 방지 핵심 */
        }
        
        /* 상단 메뉴 버튼 */
        .nav-btn { color: var(--text-muted); margin-bottom: 5px; background-color: #252628; border: 1px solid #333; }
        .nav-btn:hover { background-color: #333; color: white; }
        
        /* 새 상담 시작 버튼 (강조) */
        .new-chat-btn { background-color: var(--text-main); color: var(--bg-main); font-weight: bold; text-align: center; margin-bottom: 15px; }
        .new-chat-btn:hover { background-color: var(--accent); }

        /* 과거 기록 스크롤 영역 (동규님 피드백: 메뉴와 분리) */
        .history-list { flex: 1; overflow-y: auto; padding: 0 20px 20px 20px; }
        .history-list::-webkit-scrollbar { width: 6px; }
        .history-list::-webkit-scrollbar-thumb { background-color: #444; border-radius: 3px; }
        
        /* 개별 과거 기록 버튼 */
        .history-btn { color: var(--text-muted); margin-bottom: 5px; }
        .history-btn:hover, .history-btn.active { background-color: #333; color: white; font-weight: bold; }

        /* 우측 메인 채팅 영역 */
        .chat-container { flex: 1; display: flex; flex-direction: column; position: relative; }
        .chat-messages { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        
        .message { max-width: 80%; line-height: 1.6; word-break: break-word; }
        .message.user { align-self: flex-end; background-color: var(--bubble-user); padding: 15px 20px; border-radius: 20px 20px 0 20px; }
        .message.ai { align-self: flex-start; background-color: var(--bubble-ai); padding: 15px 20px; border-radius: 20px 20px 20px 0; border: 1px solid #333; }

        /* 하단 입력창 */
        .input-area { padding: 20px 40px 40px 40px; display: flex; justify-content: center; position: relative; }
        .input-wrapper { display: flex; width: 100%; max-width: 800px; background-color: #1e1f20; border-radius: 30px; padding: 10px 20px; align-items: center; border: 1px solid #444; }
        .input-wrapper input { flex: 1; background: none; border: none; color: white; font-size: 1rem; padding: 10px; outline: none; }
        .input-wrapper button { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 1rem; font-weight: bold; padding: 10px; transition: color 0.2s; }
        .input-wrapper button:hover { color: var(--accent); }

        /* 생성 중단 버튼 */
        #stop-btn { display: none; color: #ff6b6b; position: absolute; top: -40px; background: #1e1f20; border: 1px solid #444; border-radius: 20px; padding: 8px 16px; font-size: 0.9rem; left: 50%; transform: translateX(-50%); cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #stop-btn:hover { background: #333; color: #ff4c4c; }
        .thinking { font-style: italic; color: #888; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-top">
            <div class="sidebar-header">AI 목사님 상담소</div>
            
            <a href="{% url 'main_page' %}" class="btn-common nav-btn" style="text-decoration: none; box-sizing: border-box;">🏠 메인으로 나가기</a>
            <a href="/history/" class="btn-common nav-btn" style="text-decoration: none; box-sizing: border-box;">📁 전체 기록 관리</a>

            <hr style="border-color: #333; margin: 15px 0;">
            <a href="/chat/" class="btn-common new-chat-btn" style="text-decoration: none; box-sizing: border-box;">➕ 새로운 상담 시작</a>
        </div>

        <div class="history-list">
            {% for s in sessions %}
                <button class="btn-common history-btn {% if s.session_id|stringformat:'s' == selected_session_id %}active{% endif %}" 
                        onclick="location.href='/chat/?session_id={{ s.session_id }}'">
                    {{ s.title }}
                </button>
            {% empty %}
                <p style="color: #666; font-size: 0.9rem; text-align: center; margin-top: 10px;">이전 상담 기록이 없습니다.</p>
            {% endfor %}
        </div>
    </div>

    <div class="chat-container">
        <div class="chat-messages" id="chat-box">
            {% if not past_messages %}
                <div class="message ai">안녕하세요. 무엇이든 편안하게 말씀해 주세요. 예수님의 사랑으로 듣겠습니다.</div>
            {% else %}
                {% for msg in past_messages %}
                    <div class="message {% if msg.sender == 'USER' %}user{% else %}ai{% endif %}">
                        {{ msg.message|linebreaksbr }}
                    </div>
                {% endfor %}
            {% endif %}
        </div>

        <div class="input-area">
            <button id="stop-btn" onclick="stopGeneration()">⏹ 생성 멈추기</button>
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="여기에 마음을 적어주세요..." onkeypress="if(event.key === 'Enter') sendMessage()">
                <button onclick="sendMessage()">전송</button>
            </div>
        </div>
    </div>

    <script>
        let abortController = null;
        let currentSessionId = "{{ selected_session_id|default:'' }}";

        window.onload = function() {
            const chatBox = document.getElementById("chat-box");
            chatBox.scrollTop = chatBox.scrollHeight;
        };

        async function sendMessage() {
            const inputField = document.getElementById("user-input");
            const message = inputField.value.trim();
            if (!message) return;

            const chatBox = document.getElementById("chat-box");
            const stopBtn = document.getElementById("stop-btn");

            chatBox.innerHTML += `<div class="message user">${message.replace(/\n/g, '<br>')}</div>`;
            inputField.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            const loadingId = "loading-" + Date.now();
            chatBox.innerHTML += `<div class="message ai thinking" id="${loadingId}">AI 목사님이 기도로 답변을 준비 중입니다...</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            abortController = new AbortController();
            stopBtn.style.display = "block"; 

            try {
                const response = await fetch('/api/chat/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message, session_id: currentSessionId }),
                    signal: abortController.signal
                });

                const data = await response.json();
                
                const loadingBubble = document.getElementById(loadingId);
                if(loadingBubble) {
                    loadingBubble.className = "message ai";
                    loadingBubble.innerHTML = data.response.replace(/\n/g, '<br>');
                }
                
                if (data.session_id && !currentSessionId) {
                    currentSessionId = data.session_id;
                    window.history.replaceState({}, '', '/chat/?session_id=' + currentSessionId);
                }
                
            } catch (error) {
                if (error.name === 'AbortError') {
                    console.log("유저가 생성 강제 취소함");
                    const loadingBubble = document.getElementById(loadingId);
                    if(loadingBubble) loadingBubble.remove(); 
                    
                    if(currentSessionId) {
                        fetch('/api/delete_last_message/', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ session_id: currentSessionId })
                        });
                    }
                } else {
                    const loadingBubble = document.getElementById(loadingId);
                    if(loadingBubble) {
                        loadingBubble.className = "message ai";
                        loadingBubble.innerText = "서버 통신 중 오류가 발생했습니다. (FastAPI가 켜져 있는지 확인하세요)";
                    }
                }
            } finally {
                stopBtn.style.display = "none";
                abortController = null;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        function stopGeneration() {
            if (abortController) {
                abortController.abort();
            }
        }
    </script>
</body>
</html>
